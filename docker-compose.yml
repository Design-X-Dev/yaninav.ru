# Dev: `docker compose up` или `docker compose up --build`
services:
  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npx next dev --turbopack --hostname 0.0.0.0"

volumes:
  node_modules:
